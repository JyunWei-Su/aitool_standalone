name: Scheduled Build All Packages

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  load-packages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      has_custom: ${{ steps.parse.outputs.has_custom }}
      custom_matrix: ${{ steps.parse.outputs.custom_matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: parse
        run: |
          MATRIX=$(python3 -c "
          import yaml, json
          with open('packages.yml') as f:
              pkgs = yaml.safe_load(f)['packages']
          standard = [p for p in pkgs if p.get('type') != 'custom']
          print(json.dumps({'include': standard}))
          ")
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

          HAS_CUSTOM=$(python3 -c "
          import yaml
          with open('packages.yml') as f:
              pkgs = yaml.safe_load(f)['packages']
          custom = [p for p in pkgs if p.get('type') == 'custom']
          print('true' if custom else 'false')
          ")
          echo "has_custom=${HAS_CUSTOM}" >> "$GITHUB_OUTPUT"

          CUSTOM_MATRIX=$(python3 -c "
          import yaml, json
          with open('packages.yml') as f:
              pkgs = yaml.safe_load(f)['packages']
          custom = [p for p in pkgs if p.get('type') == 'custom']
          print(json.dumps({'include': custom}))
          ")
          echo "custom_matrix=${CUSTOM_MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: load-packages
    if: fromJson(needs.load-packages.outputs.matrix).include != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.load-packages.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        if: matrix.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version || '22' }}
      - name: Setup Go
        if: matrix.type == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version || '1.22' }}
      - name: Setup Python
        if: matrix.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version || '3.11' }}
      - name: Setup Rust
        if: matrix.type == 'rust'
        uses: dtolnay/rust-toolchain@stable
      - name: Build package
        env:
          ASSET_PATTERN: ${{ matrix.asset_pattern || '' }}
          BUILD_CMD: ${{ matrix.build_cmd || '' }}
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh \
            "${{ matrix.name }}" \
            "${{ matrix.repo }}" \
            "${{ matrix.type }}" \
            "${{ matrix.version || 'latest' }}"
      - name: Generate checksum
        run: sha256sum *.tar.gz > SHA256SUMS 2>/dev/null || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-x86_64-linux
          path: |
            *.tar.gz
            SHA256SUMS
            BUILD_INFO.txt
          retention-days: 90

  build-custom:
    needs: load-packages
    if: needs.load-packages.outputs.has_custom == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.load-packages.outputs.custom_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.name }}
        run: |
          chmod +x ${{ matrix.script }}
          bash ${{ matrix.script }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-standalone-x86_64-linux
          path: dist/*
          retention-days: 90

  bundle:
    needs: [build, build-custom]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-packages/
      - name: Build summary
        run: |
          echo "## 本次打包套件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 套件 | 版本 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for info in all-packages/*/BUILD_INFO.txt; do
            [ -f "$info" ] || continue
            name=$(grep '^name=' "$info" | cut -d= -f2)
            version=$(grep '^version=' "$info" | cut -d= -f2)
            echo "| \`${name}\` | \`${version}\` |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
      - name: Create bundle
        run: |
          DATESTAMP=$(date +%Y%m%d)
          tar czf "aitool_standalone-bundle-${DATESTAMP}.tar.gz" all-packages/
          sha256sum "aitool_standalone-bundle-${DATESTAMP}.tar.gz" > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: aitool_standalone-bundle
          path: |
            aitool_standalone-bundle-*.tar.gz
            SHA256SUMS
          retention-days: 90
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATESTAMP=$(date +%Y%m%d)
          TAG="bundle-${DATESTAMP}"
          NOTES=$(mktemp)

          echo "## 本次打包套件" > "$NOTES"
          echo "" >> "$NOTES"
          echo "| 套件 | 版本 |" >> "$NOTES"
          echo "|------|------|" >> "$NOTES"
          for info in all-packages/*/BUILD_INFO.txt; do
            [ -f "$info" ] || continue
            name=$(grep '^name=' "$info" | cut -d= -f2)
            version=$(grep '^version=' "$info" | cut -d= -f2)
            echo "| \`${name}\` | \`${version}\` |" >> "$NOTES"
          done
          echo "" >> "$NOTES"
          echo "Build date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$NOTES"

          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "aitool_standalone-bundle-${DATESTAMP}.tar.gz" \
            SHA256SUMS \
            --title "Bundle ${DATESTAMP}" \
            --notes-file "$NOTES" \
            --repo "${{ github.repository }}"
