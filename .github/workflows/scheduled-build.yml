name: Scheduled Build All Packages

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  load-packages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      has_custom: ${{ steps.parse.outputs.has_custom }}
      custom_matrix: ${{ steps.parse.outputs.custom_matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: parse
        run: |
          MATRIX=$(python3 -c "
          import yaml, json
          with open('packages.yml') as f:
              pkgs = yaml.safe_load(f)['packages']
          standard = [p for p in pkgs if p.get('type') != 'custom']
          print(json.dumps({'include': standard}))
          ")
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

          HAS_CUSTOM=$(python3 -c "
          import yaml
          with open('packages.yml') as f:
              pkgs = yaml.safe_load(f)['packages']
          custom = [p for p in pkgs if p.get('type') == 'custom']
          print('true' if custom else 'false')
          ")
          echo "has_custom=${HAS_CUSTOM}" >> "$GITHUB_OUTPUT"

          CUSTOM_MATRIX=$(python3 -c "
          import yaml, json
          with open('packages.yml') as f:
              pkgs = yaml.safe_load(f)['packages']
          custom = [p for p in pkgs if p.get('type') == 'custom']
          print(json.dumps({'include': custom}))
          ")
          echo "custom_matrix=${CUSTOM_MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: load-packages
    if: fromJson(needs.load-packages.outputs.matrix).include != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.load-packages.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        if: matrix.type == 'node'
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node_version || '22' }}
      - name: Setup Go
        if: matrix.type == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version || '1.22' }}
      - name: Setup Python
        if: matrix.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version || '3.11' }}
      - name: Setup Rust
        if: matrix.type == 'rust'
        uses: dtolnay/rust-toolchain@stable
      - name: Build package
        env:
          ASSET_PATTERN: ${{ matrix.asset_pattern || '' }}
          BUILD_CMD: ${{ matrix.build_cmd || '' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh \
            "${{ matrix.name }}" \
            "${{ matrix.repo }}" \
            "${{ matrix.type }}" \
            "${{ matrix.version || 'latest' }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-x86_64-linux
          path: dist/*
          retention-days: 90

  build-custom:
    needs: load-packages
    if: needs.load-packages.outputs.has_custom == 'true'
    runs-on: ubuntu-latest
    container:
      image: container-registry.oracle.com/os/oraclelinux:8
      options: --privileged
    strategy:
      matrix: ${{ fromJson(needs.load-packages.outputs.custom_matrix) }}
      fail-fast: false
    steps:
      - name: Install build tools
        run: dnf install -y git wget curl tar xz jq findutils sudo gcc gcc-c++ make cmake python3 python3.11 gcc-toolset-12
      - uses: actions/checkout@v6
      - name: Build ${{ matrix.name }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x ${{ matrix.script }}
          bash ${{ matrix.script }}
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-standalone-x86_64-linux
          path: dist/*
          retention-days: 90

  build-nvim-centos7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build nvim-centos7 in oraclelinux:7 container
        run: |
          docker run --rm --privileged \
            -v "$PWD:/workspace" -w /workspace \
            -e GH_TOKEN="${{ github.token }}" \
            container-registry.oracle.com/os/oraclelinux:7 \
            bash scripts/build-nvim-centos7.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nvim-centos7-standalone-x86_64-linux
          path: dist/*
          retention-days: 90

  bundle:
    needs: [build, build-custom, build-nvim-centos7]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: all-packages/
      - name: Assemble bundle
        run: |
          DATESTAMP=$(date +%y.%-m.%-d)
          BUNDLE="aitool-standalone-${DATESTAMP}"
          mkdir -p "$BUNDLE/bin" "$BUNDLE/lib" "$BUNDLE/usage"

          # Sourced by every bin/ wrapper: appends one usage record per
          # invocation ("<UTC ISO8601 timestamp>\t<version>") to
          # usage/<tool>.log — line count doubles as the invocation count.
          # Best-effort: never fails the wrapper (e.g. read-only filesystem).
          cat > "$BUNDLE/lib/_usage.sh" <<'USAGE_LIB'
          #!/bin/bash
          log_usage() {
            local name="$1" version="$2"
            local dir="$BUNDLE_DIR/usage"
            { mkdir -p "$dir" && printf '%s\t%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$version" >> "$dir/$name.log"; } 2>/dev/null || true
          }
          USAGE_LIB

          # Writes bin/<name>: a thin wrapper that logs usage, then execs the
          # real entry point at lib/<name>/<name>. Shared by binary and custom
          # packages so every bin/ entry is a wrapper, not a raw executable.
          write_wrapper() {
            local pkg_name="$1" version="$2"
            cat > "$BUNDLE/bin/$pkg_name" <<WRAPPER
          #!/bin/bash
          SCRIPT_DIR="\$(cd "\$(dirname "\$0")" && pwd)"
          BUNDLE_DIR="\$(cd "\$SCRIPT_DIR/.." && pwd)"
          . "\$BUNDLE_DIR/lib/_usage.sh"
          log_usage "$pkg_name" "$version"
          exec "\$BUNDLE_DIR/lib/$pkg_name/$pkg_name" "\$@"
          WRAPPER
            chmod +x "$BUNDLE/bin/$pkg_name"
          }

          for pkg_dir in all-packages/*/; do
            artifact=$(basename "$pkg_dir")

            info="${pkg_dir}BUILD_INFO.txt"
            version="unknown"
            if [ -f "$info" ]; then
              version="$(grep -m1 '^version=' "$info" | cut -d= -f2 || true)"
              [ -n "$version" ] || version="unknown"
            fi

            if [[ "$artifact" == *"-standalone-x86_64-linux" ]]; then
              # Custom package: extract tarball into lib/<name>/, then wrap its entry point
              pkg_name="${artifact%%-standalone-x86_64-linux}"
              tarball=$(find "$pkg_dir" -maxdepth 1 -name "*.tar.gz" | head -1)
              mkdir -p "$BUNDLE/lib/$pkg_name"
              tar xzf "$tarball" -C "$BUNDLE/lib/$pkg_name"
              write_wrapper "$pkg_name" "$version"

            elif [[ "$artifact" == *"-x86_64-linux" ]]; then
              # Binary package: move the executable into lib/<name>/, then wrap it like custom packages
              pkg_name="${artifact%%-x86_64-linux}"
              binary=$(find "$pkg_dir" -maxdepth 1 -type f ! -name "*.txt" ! -name "SHA256SUMS" | head -1)
              if [ -n "$binary" ]; then
                mkdir -p "$BUNDLE/lib/$pkg_name"
                cp "$binary" "$BUNDLE/lib/$pkg_name/$pkg_name"
                chmod +x "$BUNDLE/lib/$pkg_name/$pkg_name"
                write_wrapper "$pkg_name" "$version"
              fi
            fi
          done

          # nvim: if both the OL8 (glibc >= 2.28) and OL7/CentOS7 (glibc 2.17)
          # builds are present, replace bin/nvim with a dispatcher that picks
          # the right one based on the host's glibc version. bin/nvim-centos7
          # is left in place as an explicit override.
          if [ -d "$BUNDLE/lib/nvim" ] && [ -d "$BUNDLE/lib/nvim-centos7" ]; then
            version_nvim=$(grep -m1 '^version=' all-packages/nvim-standalone-x86_64-linux/BUILD_INFO.txt 2>/dev/null | cut -d= -f2)
            version_nvim_centos7=$(grep -m1 '^version=' all-packages/nvim-centos7-standalone-x86_64-linux/BUILD_INFO.txt 2>/dev/null | cut -d= -f2)

            cat > "$BUNDLE/bin/nvim" <<'WRAPPER'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          BUNDLE_DIR="$(cd "$SCRIPT_DIR/.." && pwd)"
          . "$BUNDLE_DIR/lib/_usage.sh"

          glibc_ver=$(ldd --version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+$')
          glibc_major=${glibc_ver%%.*}
          glibc_minor=${glibc_ver##*.}

          if [ -n "$glibc_major" ] && { [ "$glibc_major" -gt 2 ] || { [ "$glibc_major" -eq 2 ] && [ "$glibc_minor" -ge 28 ]; }; }; then
            log_usage nvim "__VERSION_NVIM__"
            exec "$BUNDLE_DIR/lib/nvim/nvim" "$@"
          else
            log_usage nvim-centos7 "__VERSION_NVIM_CENTOS7__"
            exec "$BUNDLE_DIR/lib/nvim-centos7/nvim-centos7" "$@"
          fi
          WRAPPER
            sed -i "s/__VERSION_NVIM__/${version_nvim:-unknown}/; s/__VERSION_NVIM_CENTOS7__/${version_nvim_centos7:-unknown}/" "$BUNDLE/bin/nvim"
            chmod +x "$BUNDLE/bin/nvim"
          fi

          # LICENSE.md：彙整各套件版本與授權資訊，供內部稽核使用
          {
            echo "# 套件授權與版本資訊"
            echo ""
            echo "| 套件 | 版本 | License |"
            echo "|------|------|---------|"
            for info in all-packages/*/BUILD_INFO.txt; do
              [ -f "$info" ] || continue
              name=$(grep '^name=' "$info" | cut -d= -f2)
              version=$(grep '^version=' "$info" | cut -d= -f2)
              license=$(grep '^license=' "$info" | cut -d= -f2)
              echo "| \`${name}\` | \`${version}\` | ${license:-Unknown} |"
            done
          } > "$BUNDLE/LICENSE.md"

          # Convenience script: source once to add bin/ to PATH
          {
            echo '#!/bin/bash'
            echo 'BUNDLE_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"'
            echo 'export PATH="$BUNDLE_DIR/bin:$PATH"'
            echo 'export PLAYWRIGHT_BROWSERS_PATH="$BUNDLE_DIR/lib/playwright/node_modules/playwright-core/.local-browsers"'
            echo 'echo "aitool: added $BUNDLE_DIR/bin to PATH"'
          } > "$BUNDLE/setup.sh"
          chmod +x "$BUNDLE/setup.sh"

          # C shell users: source this after cd'ing into the bundle root.
          {
            echo '#!/bin/csh'
            echo 'if (! $?AITOOL_BUNDLE_DIR) then'
            echo '  if (-d ./bin) then'
            echo '    setenv AITOOL_BUNDLE_DIR "$cwd"'
            echo '  else'
            echo '    echo "aitool: set AITOOL_BUNDLE_DIR to the bundle root, then source setup.csh"'
            echo '    echo "Example: setenv AITOOL_BUNDLE_DIR /path/to/bundle; source /path/to/bundle/setup.csh"'
            echo '  endif'
            echo 'endif'
            echo 'if ($?AITOOL_BUNDLE_DIR) then'
            echo '  setenv PATH "$AITOOL_BUNDLE_DIR/bin:$PATH"'
            echo '  setenv PLAYWRIGHT_BROWSERS_PATH "$AITOOL_BUNDLE_DIR/lib/playwright/node_modules/playwright-core/.local-browsers"'
            echo '  echo "aitool: added $AITOOL_BUNDLE_DIR/bin to PATH"'
            echo 'endif'
          } > "$BUNDLE/setup.csh"
          chmod +x "$BUNDLE/setup.csh"

          # Inject QMD_*_MODEL env vars if qmd was built with known model filenames
          QMD_NAMES=$(find all-packages/ -name "QMD_MODEL_NAMES.txt" 2>/dev/null | head -1)
          if [ -f "$QMD_NAMES" ]; then
            EMBED_F="" GEN_F="" RERANK_F=""
            while IFS='=' read -r key val; do
              case "$key" in
                QMD_EMBED_MODEL_FILE)    EMBED_F="$val"  ;;
                QMD_GENERATE_MODEL_FILE) GEN_F="$val"    ;;
                QMD_RERANK_MODEL_FILE)   RERANK_F="$val" ;;
              esac
            done < "$QMD_NAMES"
            {
              echo "export QMD_EMBED_MODEL=\"\$BUNDLE_DIR/lib/qmd/models/${EMBED_F}\""
              echo "export QMD_GENERATE_MODEL=\"\$BUNDLE_DIR/lib/qmd/models/${GEN_F}\""
              echo "export QMD_RERANK_MODEL=\"\$BUNDLE_DIR/lib/qmd/models/${RERANK_F}\""
            } >> "$BUNDLE/setup.sh"
            {
              echo "if (\$?AITOOL_BUNDLE_DIR) then"
              echo "  setenv QMD_EMBED_MODEL    \"\$AITOOL_BUNDLE_DIR/lib/qmd/models/${EMBED_F}\""
              echo "  setenv QMD_GENERATE_MODEL \"\$AITOOL_BUNDLE_DIR/lib/qmd/models/${GEN_F}\""
              echo "  setenv QMD_RERANK_MODEL   \"\$AITOOL_BUNDLE_DIR/lib/qmd/models/${RERANK_F}\""
              echo "endif"
            } >> "$BUNDLE/setup.csh"
          fi

          sha256sum "$BUNDLE"/bin/* > "$BUNDLE/SHA256SUMS" 2>/dev/null || true
          tar czf "${BUNDLE}.tar.gz" "$BUNDLE/"
          echo "  bundle size: $(du -sh "${BUNDLE}.tar.gz" | cut -f1)"
          sha256sum "${BUNDLE}.tar.gz" > SHA256SUMS

      - name: Build summary
        run: |
          echo "## 本次打包套件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 套件 | 版本 | License |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY
          for info in all-packages/*/BUILD_INFO.txt; do
            [ -f "$info" ] || continue
            name=$(grep '^name=' "$info" | cut -d= -f2)
            version=$(grep '^version=' "$info" | cut -d= -f2)
            license=$(grep '^license=' "$info" | cut -d= -f2)
            echo "| \`${name}\` | \`${version}\` | ${license:-Unknown} |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v6
        with:
          name: aitool-standalone-bundle
          path: |
            aitool-standalone-*.tar.gz
            SHA256SUMS
          retention-days: 90

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATESTAMP=$(date +%y.%-m.%-d)
          TAG="${DATESTAMP}"
          NOTES=$(mktemp)

          echo "## 本次打包套件" > "$NOTES"
          echo "" >> "$NOTES"
          echo "| 套件 | 版本 | License |" >> "$NOTES"
          echo "|------|------|---------|" >> "$NOTES"
          for info in all-packages/*/BUILD_INFO.txt; do
            [ -f "$info" ] || continue
            name=$(grep '^name=' "$info" | cut -d= -f2)
            version=$(grep '^version=' "$info" | cut -d= -f2)
            license=$(grep '^license=' "$info" | cut -d= -f2)
            echo "| \`${name}\` | \`${version}\` | ${license:-Unknown} |" >> "$NOTES"
          done
          echo "" >> "$NOTES"
          echo "Build date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$NOTES"

          # Collect qmd model parts (each ≤1.8 GB, within GitHub asset limit)
          RELEASE_ASSETS=("aitool-standalone-${DATESTAMP}.tar.gz" "SHA256SUMS")
          MODEL_PARTS=()
          while IFS= read -r part; do
            MODEL_PARTS+=("$part")
            RELEASE_ASSETS+=("$part")
            # Append part hash (filename only) to the release SHA256SUMS
            sha256sum "$part" | sed 's|.*/||' >> SHA256SUMS
          done < <(find all-packages/ -name "qmd-models-*.part-*" | sort)

          # Append reassembly instructions if model parts exist
          if [ ${#MODEL_PARTS[@]} -gt 0 ]; then
            {
              echo ""
              echo "## qmd 模型（離線 GGUF，需手動安裝）"
              echo ""
              echo "下載所有 \`qmd-models-*.part-*\` 檔案後，在解壓的 bundle 目錄執行："
              echo ""
              echo "    cat qmd-models-*.part-* > qmd-models.tar.gz"
              echo "    tar xzf qmd-models.tar.gz -C lib/qmd/"
              echo "    rm qmd-models.tar.gz"
            } >> "$NOTES"
          fi

          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            "${RELEASE_ASSETS[@]}" \
            --title "${DATESTAMP}" \
            --notes-file "$NOTES" \
            --repo "${{ github.repository }}"
