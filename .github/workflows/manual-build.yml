name: Manual Build Single Package

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name (must match packages.yml)'
        required: true
        default: 'playwright'
      version:
        description: 'Version tag (e.g. v0.1.0), leave empty for latest'
        required: false
        default: 'latest'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-type:
    runs-on: ubuntu-latest
    outputs:
      is_custom: ${{ steps.check.outputs.is_custom }}
      script: ${{ steps.check.outputs.script }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          python3 -c "
          import yaml, os
          with open('packages.yml') as f:
              pkgs = yaml.safe_load(f)['packages']
          pkg = next((p for p in pkgs if p['name'] == '${{ inputs.package_name }}'), None)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              if pkg and pkg.get('type') == 'custom':
                  out.write('is_custom=true\n')
                  out.write('script=' + pkg['script'] + '\n')
              else:
                  out.write('is_custom=false\n')
          "

  build-standard:
    needs: detect-type
    if: needs.detect-type.outputs.is_custom == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load package config
        id: pkg
        run: |
          python3 -c "
          import yaml, os
          with open('packages.yml') as f:
              pkgs = yaml.safe_load(f)['packages']
          pkg = next(p for p in pkgs if p['name'] == '${{ inputs.package_name }}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              for k, v in pkg.items():
                  out.write(f'{k}={v}\n')
          "
      - name: Setup Node.js
        if: steps.pkg.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.pkg.outputs.node_version || '22' }}
      - name: Setup Go
        if: steps.pkg.outputs.type == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.pkg.outputs.go_version || '1.22' }}
      - name: Setup Python
        if: steps.pkg.outputs.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.pkg.outputs.python_version || '3.11' }}
      - name: Build
        env:
          ASSET_PATTERN: ${{ steps.pkg.outputs.asset_pattern || '' }}
          BUILD_CMD: ${{ steps.pkg.outputs.build_cmd || '' }}
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh \
            "${{ inputs.package_name }}" \
            "${{ steps.pkg.outputs.repo }}" \
            "${{ steps.pkg.outputs.type }}" \
            "${{ inputs.version }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}-x86_64-linux
          path: dist/*
          retention-days: 90

  build-custom:
    needs: detect-type
    if: needs.detect-type.outputs.is_custom == 'true'
    runs-on: ubuntu-latest
    container:
      image: oraclelinux:8
      options: --privileged
    steps:
      - name: Install build tools
        run: dnf install -y git wget curl tar xz jq findutils sudo gcc gcc-c++ make python3 python3.11 gcc-toolset-12
      - uses: actions/checkout@v4
      - name: Build ${{ inputs.package_name }}
        env:
          PLAYWRIGHT_VERSION: ${{ inputs.version != 'latest' && inputs.version || '' }}
          QMD_VERSION: ${{ inputs.version != 'latest' && inputs.version || 'latest' }}
        run: |
          chmod +x ${{ needs.detect-type.outputs.script }}
          bash ${{ needs.detect-type.outputs.script }}
      - name: Build summary
        run: |
          if [ -f dist/BUILD_INFO.txt ]; then
            echo "## 打包結果" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 套件 | 版本 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            name=$(grep '^name=' dist/BUILD_INFO.txt | cut -d= -f2)
            version=$(grep '^version=' dist/BUILD_INFO.txt | cut -d= -f2)
            echo "| \`${name}\` | \`${version}\` |" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}-standalone-x86_64-linux
          path: dist/*
          retention-days: 90
